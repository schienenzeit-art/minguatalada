[tool.ruff]
line-length = 120
target-version = "py312"
exclude = [
    ".venv",
    "venv",
    "dist",
    "build",
    "node_modules",
    "__pycache__",
    "graphify-out",
    "installer",
    "scripts/_compile_pdf_service.py",
]

[tool.ruff.lint]
# Sprint 2: F401 (unused imports) aktiviert nach Legacy-Bereinigung
# E9xx  = Syntax-Fehler (SyntaxError, IndentationError)
# F401  = importiertes Modul nicht genutzt
# F7xx  = Statement-Fehler (assert, break, return falsch platziert)
# F821  = Undefinierter Name (echter Bug)
# F822  = Undefinierter Name im __all__
# F823  = lokaler Name vor Zuweisung referenziert
select = ["E9", "F401", "F7", "F821", "F822", "F823"]

# F811 (redefinition) und isort (I) kommen in Sprint 3
ignore = []

[tool.ruff.lint.per-file-ignores]
# Test-Dateien: F821 + F401 (Test-Imports häufig in Fixtures oder lokalen Scopes)
"tests/**" = ["F821", "F401"]
# Init-Dateien re-exportieren häufig
"**/__init__.py" = ["F401", "F811"]
# UI-Dateien: PyQt6-Imports werden oft vorsorglich/für spätere Nutzung importiert
"ui/**" = ["F401"]
# Scripts: Einzel-Skripte mit optionalen Dev-Imports
"scripts/**" = ["F401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
strict = false
# Sprint 3: schrittweise auf strict=true erhöhen, beginnend mit domain/ und services/
files = ["core", "domain", "services", "app"]
