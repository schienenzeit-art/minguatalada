[pytest]
testpaths = tests
python_files = test_*.py
python_classes = *Test*
python_functions = test_*
pythonpath = .

# Marker-Definitionen (keine Warnung bei unbekannten Markern)
markers =
    unit: Reine Unit-Tests ohne DB oder I/O (schnell, immer laufen)
    integration: Tests mit echter Datenbank (etwas langsamer)
    slow: Langsame Tests (Backup, Update) – können in CI separiert werden

# Immer ausführlich bei Fehlern, keine Abkürzungen
addopts = --tb=short

# Keine impliziten Namespaces
filterwarnings =
    ignore::DeprecationWarning
