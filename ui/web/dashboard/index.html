<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script type="module" src="https://unpkg.com/@vscode-elements/elements?module"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="title-block">
          <h1>Dashboard</h1>
          <p>Modernes Fachcockpit für Ansprüche, KPI-Filter und schnelle Navigation.</p>
        </div>
        <div class="hero-actions">
          <vscode-text-field id="search" placeholder="Suche..." size="medium"></vscode-text-field>
          <vscode-button id="newClaim" appearance="primary">Neuer Antrag</vscode-button>
        </div>
      </header>

      <section class="kpi-grid" id="kpiGrid"></section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2>Aktuelle Fälle</h2>
            <p>Die fünf neuesten Fälle aus derselben Datenquelle wie die Antragsliste.</p>
          </div>
          <vscode-button id="showAll" appearance="secondary">Alle Fälle anzeigen</vscode-button>
        </div>
        <div id="claimsContainer" class="cards-list"></div>
      </section>
    </div>

    <template id="kpi-card-template">
      <vscode-card class="kpi-card" elevation="2">
        <div class="kpi-body">
          <div class="kpi-title"></div>
          <div class="kpi-value"></div>
          <div class="kpi-subtitle"></div>
        </div>
      </vscode-card>
    </template>

    <template id="claim-row-template">
      <vscode-card class="claim-row" elevation="1">
        <div class="claim-left">
          <div class="claim-number"></div>
          <div class="claim-person"></div>
        </div>
        <div class="claim-meta">
          <span class="claim-location"></span>
          <vscode-badge class="claim-badge"></vscode-badge>
          <span class="claim-date"></span>
        </div>
      </vscode-card>
    </template>

    <script type="module" src="dashboard.js"></script>
  </body>
</html>
