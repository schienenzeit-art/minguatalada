<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeitraumreport</title>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <link rel="stylesheet" href="reports.css" />
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <h1>Zeitraumreport</h1>
        <p>Erstellt Berichtszahlen für Anträge, Prüfungen, Entscheidungen und Kundenstamm pro Laden im gewählten Zeitraum.</p>
      </div>
      <div class="actions">
        <button id="refreshButton" type="button" class="secondary">Aktualisieren</button>
        <button id="exportPdfButton" type="button" class="primary">PDF exportieren</button>
        <button id="exportExcelButton" type="button" class="secondary">Excel exportieren</button>
      </div>
    </section>

    <section class="filters">
      <div class="filter-row">
        <label for="locationSelect">Standort</label>
        <select id="locationSelect"></select>
      </div>
      <div class="filter-row">
        <label for="startDateInput">Startdatum</label>
        <input id="startDateInput" type="date" />
      </div>
      <div class="filter-row">
        <label for="endDateInput">Enddatum</label>
        <input id="endDateInput" type="date" />
      </div>
    </section>

    <section class="metrics">
      <h2>Report-Parameter</h2>
      <div class="metric-grid">
        <div class="metric-item"><label><input id="metric-applications" type="checkbox" checked /> Anträge</label></div>
        <div class="metric-item"><label><input id="metric-evaluations" type="checkbox" checked /> Prüfungen</label></div>
        <div class="metric-item"><label><input id="metric-approved" type="checkbox" checked /> anspruchsberechtigte</label></div>
        <div class="metric-item"><label><input id="metric-rejected" type="checkbox" checked /> abgelehnte</label></div>
        <div class="metric-item"><label><input id="metric-hardship" type="checkbox" checked /> Härtefälle</label></div>
        <div class="metric-item"><label><input id="metric-cards" type="checkbox" checked /> Kundenstamm pro Laden</label></div>
      </div>
    </section>

    <section class="report-card">
      <div class="report-summary">
        <div>
          <span class="label">Standort</span>
          <strong id="reportLocation">-</strong>
        </div>
        <div>
          <span class="label">Zeitraum</span>
          <strong id="reportPeriod">-</strong>
        </div>
      </div>
      <table id="reportTable">
        <thead>
          <tr>
            <th>Bericht</th>
            <th>Wert</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div id="locationSection" class="location-section hidden">
        <h3>Kundenstamm pro Laden</h3>
        <table id="locationTable">
          <thead>
            <tr>
              <th>Standort</th>
              <th>Karten im Zeitraum</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="message" class="message"></div>
    </section>
  </main>
  <script src="reports.js"></script>
</body>
</html>
